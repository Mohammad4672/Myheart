<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ruba ❤️</title>

<style>
html,body{
margin:0;
height:100%;
overflow:hidden;
font-family:Arial;
background:radial-gradient(circle at top,#1e6bff,#0b1b52,#050816);
}

/* stars */
.star{
position:absolute;
width:2px;height:2px;
background:white;
border-radius:50%;
opacity:0.7;
animation:twinkle 3s infinite ease-in-out;
}
@keyframes twinkle{0%,100%{opacity:0;}50%{opacity:1;}}

/* layout */
.center{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
}

/* stages */
#intro,#heartStage,#finalStage{
width:100%;height:100%;
display:none;
}
#intro{display:block;}

/* intro */
#openBtn{
color:white;
font-size:32px;
cursor:pointer;
text-shadow:0 0 15px #66b3ff;
}

/* heart */
#heartBox{
width:320px;height:320px;
cursor:pointer;
position:relative;
}
.half{
position:absolute;
top:50%;left:50%;
font-size:190px;
transform:translate(-50%,-50%);
transition:1s ease;
filter:drop-shadow(0 0 25px #ff4d88);
}
.open .left{
transform:translate(calc(-50% - 130px),-50%);
}
.open .right{
transform:translate(calc(-50% + 130px),-50%) scaleX(-1);
}

#insideText{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:60px;
color:white;
opacity:0;
text-shadow:0 0 10px #fff;
transition:1s;
cursor:pointer;
}
.show{opacity:1;}

/* final */
#finalText{
color:white;
font-size:70px;
text-shadow:0 0 20px #66b3ff;
opacity:0;
}
.showFinal{opacity:1;}

/* hearts */
.heart{
position:absolute;
bottom:-50px;
font-size:24px;
animation:rise 4s linear forwards;
}
@keyframes rise{
0%{transform:translateY(0);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}
</style>
</head>

<body>

<script>
for(let i=0;i<120;i++){
const s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
document.body.appendChild(s);
}
</script>

<!-- INTRO -->
<div id="intro">
<div class="center">
<div id="openBtn">Open Message ❤️</div>
</div>
</div>

<!-- HEART -->
<div id="heartStage">
<div class="center">
<div id="heartBox">
<div class="half left">🫀</div>
<div class="half right">🫀</div>
<div id="insideText">Ruba</div>
</div>
</div>
</div>

<!-- FINAL -->
<div id="finalStage">
<div class="center">
<div id="finalText">Ruba ❤️</div>
</div>
</div>

<!-- AUDIO -->
<audio id="music" src="music.m4a" loop></audio>
<audio id="v1" src="voice1.m4a"></audio>
<audio id="v2" src="voice2.m4a"></audio>
<audio id="v3" src="voice3.m4a"></audio>
<audio id="v4" src="voice4.m4a"></audio>
<audio id="soft" src="soft.m4a"></audio>

<script>
let stage = 0;
let busy = false;
let heartInterval = null;

const intro = document.getElementById("intro");
const heartStage = document.getElementById("heartStage");
const finalStage = document.getElementById("finalStage");

const openBtn = document.getElementById("openBtn");
const heartBox = document.getElementById("heartBox");
const insideText = document.getElementById("insideText");
const finalText = document.getElementById("finalText");

const music = document.getElementById("music");
const v1 = document.getElementById("v1");
const v2 = document.getElementById("v2");
const v3 = document.getElementById("v3");
const v4 = document.getElementById("v4");
const soft = document.getElementById("soft");

function showStage(s){
intro.style.display="none";
heartStage.style.display="none";
finalStage.style.display="none";

if(s==="heart") heartStage.style.display="block";
if(s==="final") finalStage.style.display="block";
}

function spawnHeart(){
const h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),4000);
}

function startHearts(){
heartInterval = setInterval(spawnHeart, 600);
}

/* INTRO */
openBtn.onclick = async () => {
if(busy) return;
busy = true;

showStage("heart");

try{
await music.play();
await v1.play();
}catch(e){}

stage = 1;

setTimeout(()=>busy=false,800);
};

/* HEART CLICK */
heartBox.onclick = async () => {
if(busy) return;

if(stage===1){
busy=true;

heartBox.classList.add("open");
insideText.classList.add("show");

try{ await v2.play(); }catch(e){}

stage=2;
setTimeout(()=>busy=false,800);
}

else if(stage===3){
busy=true;

heartBox.classList.add("open");
insideText.classList.add("show");

try{ await v4.play(); }catch(e){}

stage=4;
setTimeout(()=>busy=false,800);
}
};

/* INSIDE TEXT */
insideText.onclick = async (e) => {
e.stopPropagation();
if(busy) return;

if(stage===2){
busy=true;

heartBox.classList.remove("open");
insideText.style.top="15%";

try{ await v3.play(); }catch(e){}

stage=3;
setTimeout(()=>busy=false,800);
}

else if(stage===4){
showStage("final");

finalText.classList.add("showFinal");

music.pause();
try{ soft.play(); }catch(e){}

startHearts();
}
};
</script>

</body>
</html>
