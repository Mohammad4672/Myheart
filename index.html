<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Ruba</title>
    <style>
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #1e6bff, #0b1b52, #050816);
        }

        /* Stars */
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.7;
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Center */
        .center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        /* Stages */
        .stage {
            width: 100%;
            height: 100%;
            display: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        .stage.active {
            display: block;
        }

        /* Intro */
        #openBtn {
            color: white;
            font-size: 32px;
            cursor: pointer;
            text-shadow: 0 0 15px #66b3ff;
            transition: all 0.3s ease;
        }

        #openBtn:hover {
            transform: scale(1.1);
        }

        /* Heart */
        .heart-container {
            width: 320px;
            height: 320px;
            position: relative;
            cursor: pointer;
        }

        .heart-half {
            position: absolute;
            top: 50%;
            left: 50%;
            font-size: 190px;
            transform: translate(-50%, -50%);
            transition: 1s ease;
            filter: drop-shadow(0 0 25px #ff4d88);
        }

        .heart-half.left {
            transform: translate(-50%, -50%);
        }

        .heart-half.right {
            transform: translate(-50%, -50%) scaleX(-1);
        }

        .heart-container.open .heart-half.left {
            transform: translate(calc(-50% - 130px), -50%);
        }

        .heart-container.open .heart-half.right {
            transform: translate(calc(-50% + 130px), -50%) scaleX(-1);
        }

        /* Name inside heart */
        #insideText {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            color: white;
            opacity: 0;
            text-shadow: 0 0 20px #ff4d88, 0 0 40px #ff4d88, 0 0 60px #ff4d88;
            transition: all 1s ease;
            cursor: pointer;
            z-index: 10;
        }

        #insideText.show {
            opacity: 1;
            animation: pulse 1s infinite;
        }

        #insideText.moveUp {
            top: 20%;
        }

        #insideText.finalPosition {
            top: 30%;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.15); }
        }

        /* Floating hearts */
        .floating-heart {
            position: fixed;
            bottom: -50px;
            font-size: 24px;
            animation: rise 4s linear forwards;
            pointer-events: none;
        }

        @keyframes rise {
            0% { transform: translateY(0); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-120vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Stars -->
    <script>
        for (let i = 0; i < 120; i++) {
            const s = document.createElement("div");
            s.className = "star";
            s.style.left = Math.random() * 100 + "vw";
            s.style.top = Math.random() * 100 + "vh";
            s.style.animationDelay = Math.random() * 3 + "s";
            document.body.appendChild(s);
        }
    </script>

    <!-- Intro -->
    <div id="intro" class="stage active">
        <div class="center">
            <div id="openBtn">Open Message</div>
        </div>
    </div>

    <!-- Heart Stage -->
    <div id="heartStage" class="stage">
        <div class="center">
            <div class="heart-container" id="heartContainer">
                <div class="heart-half left">🫀</div>
                <div class="heart-half right">🫀</div>
                <div id="insideText">Ruba</div>
            </div>
        </div>
    </div>

    <!-- Audio -->
    <audio id="music" src="music.m4a" loop></audio>
    <audio id="v1" src="voice1.m4a"></audio>
    <audio id="v2" src="voice2.m4a"></audio>
    <audio id="v3" src="voice3.m4a"></audio>
    <audio id="v4" src="voice4.m4a"></audio>
    <audio id="soft" src="soft.m4a" loop></audio>

    <script>
        let stage = 0;

        const intro = document.getElementById("intro");
        const heartStage = document.getElementById("heartStage");
        const openBtn = document.getElementById("openBtn");
        const heartContainer = document.getElementById("heartContainer");
        const insideText = document.getElementById("insideText");

        const music = document.getElementById("music");
        const v1 = document.getElementById("v1");
        const v2 = document.getElementById("v2");
        const v3 = document.getElementById("v3");
        const v4 = document.getElementById("v4");
        const soft = document.getElementById("soft");

        function showStage(s) {
            intro.classList.remove("active");
            heartStage.classList.remove("active");
            if (s === "intro") intro.classList.add("active");
            if (s === "heart") heartStage.classList.add("active");
        }

        function spawnHeart() {
            const h = document.createElement("div");
            h.className = "floating-heart";
            h.innerHTML = "💖";
            h.style.left = Math.random() * 100 + "vw";
            h.style.fontSize = (Math.random() * 15 + 20) + "px";
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 4000);
        }

        function startHearts() {
            setInterval(spawnHeart, 300);
        }

        // Stage 0: Click "Open Message"
        openBtn.onclick = () => {
            showStage("heart");
            music.play().catch(() => {});
            v1.play().catch(() => {});
            stage = 1;
        };

        // Heart clicks
        heartContainer.onclick = () => {
            // Stage 1: Open heart, show name
            if (stage === 1) {
                heartContainer.classList.add("open");
                insideText.classList.add("show");
                v2.play().catch(() => {});
                stage = 2;
            }
            // Stage 3: Open heart again, show name again
            else if (stage === 3) {
                heartContainer.classList.add("open");
                insideText.classList.remove("moveUp");
                insideText.style.opacity = "1";
                insideText.classList.add("show");
                v4.play().catch(() => {});
                stage = 4;
            }
        };

        // Name clicks
        insideText.onclick = (e) => {
            e.stopPropagation();

            // Stage 2: Move name up, close heart, wait 5 sec then hide
            if (stage === 2) {
                insideText.classList.add("moveUp");
                heartContainer.classList.remove("open");
                v3.play().catch(() => {});
                stage = 3;

                setTimeout(() => {
                    if (stage === 3) {
                        insideText.classList.remove("show");
                        insideText.classList.remove("moveUp");
                        insideText.style.opacity = "0";
                    }
                }, 5000);
            }
            // Stage 4: Final - name stays up, hearts float, soft music
            else if (stage === 4) {
                insideText.classList.add("finalPosition");
                heartContainer.classList.remove("open");
                music.pause();
                soft.play().catch(() => {});
                startHearts();
                stage = 5;
            }
        };
    </script>

</body>
</html>
