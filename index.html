<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Ruba</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');

        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #1e6bff, #0b1b52, #050816);
        }

        /* Stars */
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.7;
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Center */
        .center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        /* Stages */
        .stage {
            width: 100%;
            height: 100%;
            display: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        .stage.active {
            display: block;
        }

        /* Intro */
        #openBtn {
            color: white;
            font-size: 32px;
            cursor: pointer;
            text-shadow: 0 0 15px #66b3ff;
            transition: all 0.3s ease;
        }

        #openBtn:hover {
            transform: scale(1.1);
        }

        /* Heart */
        .heart-container {
            width: 320px;
            height: 320px;
            position: relative;
        }

        .heart-half {
            position: absolute;
            top: 50%;
            left: 50%;
            font-size: 190px;
            transform: translate(-50%, -50%);
            transition: 1s ease;
            filter: drop-shadow(0 0 25px #ff4d88);
        }

        .heart-half.left {
            transform: translate(-50%, -50%);
        }

        .heart-half.right {
            transform: translate(-50%, -50%) scaleX(-1);
        }

        /* Heart pulse animation */
        .heart-container:not(.open) .heart-half.left {
            animation: heartPulseLeft 1.2s infinite;
        }

        .heart-container:not(.open) .heart-half.right {
            animation: heartPulseRight 1.2s infinite;
        }

        @keyframes heartPulseLeft {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }

        @keyframes heartPulseRight {
            0%, 100% { transform: translate(-50%, -50%) scaleX(-1) scale(1); }
            50% { transform: translate(-50%, -50%) scaleX(-1) scale(1.1); }
        }

        .heart-container.open .heart-half.left {
            transform: translate(calc(-50% - 130px), -50%);
            animation: none;
        }

        .heart-container.open .heart-half.right {
            transform: translate(calc(-50% + 130px), -50%) scaleX(-1);
            animation: none;
        }

        /* Heart click area - center only */
        .heart-click-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            cursor: pointer;
            z-index: 5;
            border-radius: 50%;
        }

        .heart-click-area.disabled {
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Name inside heart */
        #insideText {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Dancing Script', cursive;
            font-size: 70px;
            font-weight: 700;
            color: white;
            opacity: 0;
            text-shadow: 0 0 20px #ff4d88, 0 0 40px #ff4d88, 0 0 60px #ff4d88;
            transition: all 1s ease;
            cursor: pointer;
            z-index: 10;
            white-space: nowrap;
        }

        #insideText.show {
            opacity: 1;
            animation: pulse 1s infinite;
        }

        #insideText.disabled {
            cursor: not-allowed;
            pointer-events: none;
        }

        #insideText.moveUp {
            top: 20%;
        }

        #insideText.finalPosition {
            top: 25%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.15); }
        }

        /* Love text */
        #loveText {
            position: absolute;
            top: 38%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Dancing Script', cursive;
            font-size: 50px;
            font-weight: 700;
            color: white;
            opacity: 0;
            text-shadow: 0 0 20px #ff4d88, 0 0 40px #ff4d88;
            transition: all 1s ease;
            white-space: nowrap;
        }

        #loveText.show {
            opacity: 1;
        }

        /* Floating hearts */
        .floating-heart {
            position: fixed;
            bottom: -50px;
            font-size: 24px;
            animation: rise 4s linear forwards;
            pointer-events: none;
        }

        @keyframes rise {
            0% { transform: translateY(0); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-120vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Stars -->
    <script>
        for (let i = 0; i < 120; i++) {
            const s = document.createElement("div");
            s.className = "star";
            s.style.left = Math.random() * 100 + "vw";
            s.style.top = Math.random() * 100 + "vh";
            s.style.animationDelay = Math.random() * 3 + "s";
            document.body.appendChild(s);
        }
    </script>

    <!-- Intro -->
    <div id="intro" class="stage active">
        <div class="center">
            <div id="openBtn">Open Message</div>
        </div>
    </div>

    <!-- Heart Stage -->
    <div id="heartStage" class="stage">
        <div class="center">
            <div class="heart-container" id="heartContainer">
                <div class="heart-half left">🫀</div>
                <div class="heart-half right">🫀</div>
                <div class="heart-click-area" id="heartClickArea"></div>
                <div id="insideText">Ruba</div>
            </div>
            <div id="loveText">Bhbk</div>
        </div>
    </div>

    <!-- Audio -->
    <audio id="music" src="music.m4a" loop></audio>
    <audio id="v1" src="voice1.m4a"></audio>
    <audio id="v2" src="voice2.m4a"></audio>
    <audio id="v3" src="voice3.m4a"></audio>
    <audio id="v4" src="voice4.m4a"></audio>
    <audio id="soft" src="soft.m4a" loop></audio>

    <script>
        let stage = 0;
        let canClick = true;

        const intro = document.getElementById("intro");
        const heartStage = document.getElementById("heartStage");
        const openBtn = document.getElementById("openBtn");
        const heartContainer = document.getElementById("heartContainer");
        const heartClickArea = document.getElementById("heartClickArea");
        const insideText = document.getElementById("insideText");
        const loveText = document.getElementById("loveText");

        const music = document.getElementById("music");
        const v1 = document.getElementById("v1");
        const v2 = document.getElementById("v2");
        const v3 = document.getElementById("v3");
        const v4 = document.getElementById("v4");
        const soft = document.getElementById("soft");

        function disableClicks() {
            canClick = false;
            heartClickArea.classList.add("disabled");
            insideText.classList.add("disabled");
        }

        function enableClicks() {
            canClick = true;
            heartClickArea.classList.remove("disabled");
            insideText.classList.remove("disabled");
        }

        function showStage(s) {
            intro.classList.remove("active");
            heartStage.classList.remove("active");
            if (s === "intro") intro.classList.add("active");
            if (s === "heart") heartStage.classList.add("active");
        }

        function spawnHeart() {
            const h = document.createElement("div");
            h.className = "floating-heart";
            const hearts = ["💖", "💕", "💗", "💓", "🫀", "💘", "❤️"];
            h.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
            h.style.left = Math.random() * 100 + "vw";
            h.style.fontSize = (Math.random() * 15 + 20) + "px";
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 4000);
        }

        function startHearts() {
            setInterval(spawnHeart, 300);
        }

        // Stage 0: Click "Open Message"
        openBtn.onclick = () => {
            if (!canClick) return;
            
            disableClicks();
            showStage("heart");
            music.play().catch(() => {});
            v1.play().catch(() => {});
            stage = 1;

            v1.onended = () => {
                enableClicks();
            };
        };

        // Heart click area
        heartClickArea.onclick = () => {
            if (!canClick) return;

            // Stage 1: Open heart, show name
            if (stage === 1) {
                disableClicks();
                heartContainer.classList.add("open");
                insideText.classList.add("show");
                v2.play().catch(() => {});
                stage = 2;

                v2.onended = () => {
                    enableClicks();
                };
            }
            // Stage 3: Open heart again, show name again
            else if (stage === 3) {
                disableClicks();
                heartContainer.classList.add("open");
                insideText.classList.remove("moveUp");
                insideText.style.top = "50%";
                insideText.style.opacity = "1";
                insideText.classList.add("show");
                v4.play().catch(() => {});
                stage = 4;

                v4.onended = () => {
                    enableClicks();
                };
            }
        };

        // Name clicks
        insideText.onclick = (e) => {
            e.stopPropagation();
            if (!canClick) return;

            // Stage 2: Move name up, close heart, wait 5 sec then hide
            if (stage === 2) {
                disableClicks();
                insideText.classList.add("moveUp");
                heartContainer.classList.remove("open");
                v3.play().catch(() => {});
                stage = 3;

                v3.onended = () => {
                    setTimeout(() => {
                        if (stage === 3) {
                            insideText.classList.remove("show");
                            insideText.classList.remove("moveUp");
                            insideText.style.opacity = "0";
                            insideText.style.top = "50%";
                            enableClicks();
                        }
                    }, 5000);
                };
            }
            // Stage 4: Final - name stays up, love text shows, hearts float, soft music
            else if (stage === 4) {
                insideText.classList.add("finalPosition");
                heartContainer.classList.remove("open");
                loveText.classList.add("show");
                music.pause();
                soft.play().catch(() => {});
                startHearts();
                stage = 5;
            }
        };
    </script>

</body>
</html>
